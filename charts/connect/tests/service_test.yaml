suite: service tests
templates:
  - service.yaml
tests:
  - it: should enable service default
    asserts:
      - matchSnapshot:
          path: spec

  - it: should enable service custom
    set:
      service:
        type: LoadBalancer
        port: 8080
        extraPorts:
          - name: extraPort
            port: 9999
            targetPort: 9999
            protocol: UDP
    asserts:
      - matchSnapshot:
          path: spec

  - it: should contain empty annotations
    values:
      - ../values.yaml
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should contain filled annotations
    templates:
      - service.yaml
    set:
      service:
        annotations:
          test: test
    asserts:
      - equal:
          path: metadata.annotations
          value:
            test: test

  - it: should apply commonAnnotations only
    set:
      commonAnnotations:
        example.com/team: platform
        example.com/env: prod
    asserts:
      - equal:
          path: metadata.annotations
          value:
            example.com/env: prod
            example.com/team: platform

  - it: should merge commonAnnotations with service annotations
    set:
      commonAnnotations:
        example.com/team: platform
      service:
        annotations:
          svc-key: svc-value
    asserts:
      - equal:
          path: metadata.annotations
          value:
            example.com/team: platform
            svc-key: svc-value

  - it: should not have annotations when commonAnnotations removed
    set:
      commonAnnotations: {}
      service:
        annotations: {}
    asserts:
      - isNull:
          path: metadata.annotations
