suite: service monitor tests
templates:
  - servicemonitor.yaml
tests:
  - it: should set scheme
    set:
      serviceMonitor:
        enabled: true
        scheme: https
    asserts:
      - equal:
          path: spec.endpoints[0].scheme
          value: https

  - it: should apply commonAnnotations to service monitor
    set:
      serviceMonitor:
        enabled: true
      commonAnnotations:
        example.com/team: platform
    asserts:
      - equal:
          path: metadata.annotations
          value:
            example.com/team: platform

  - it: should not have service monitor annotations when commonAnnotations empty
    set:
      serviceMonitor:
        enabled: true
      commonAnnotations: {}
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should set scheme default
    set:
      serviceMonitor:
        enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].scheme
          value: http

  - it: should set basic auth
    set:
      serviceMonitor:
        enabled: true
        basicAuth:
          username: foo
          password: bar
    asserts:
      - equal:
          path: spec.endpoints[0].basicAuth
          value:
            username: foo
            password: bar

  - it: should set tlsConfig
    set:
      serviceMonitor:
        enabled: true
        tlsConfig:
          ca: my-ca
          cert: my-cert
          keySecret: secret
    asserts:
      - equal:
          path: spec.endpoints[0].tlsConfig
          value:
            ca: my-ca
            cert: my-cert
            keySecret: secret