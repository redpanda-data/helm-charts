suite: hpa tests
templates:
  - hpa.yaml
tests:
  - it: should enable autoscaler default
    set:
      autoscaling:
        enabled: true
    asserts:
      - matchSnapshot:
          path: spec

  - it: should apply commonAnnotations to hpa
    set:
      autoscaling:
        enabled: true
      commonAnnotations:
        example.com/team: platform
    asserts:
      - equal:
          path: metadata.annotations
          value:
            example.com/team: platform

  - it: should not have hpa annotations when commonAnnotations empty
    set:
      autoscaling:
        enabled: true
      commonAnnotations: {}
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should configure autoscaler custom
    set:
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 28
        metrics:
          - type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 20
          - type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 20
        behavior:
          scaleDown:
            stabilizationWindowSeconds: 200
            policies:
              - type: Pods
                value: 3
                periodSeconds: 40
    asserts:
      - matchSnapshot:
          path: spec
